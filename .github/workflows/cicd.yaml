name: Deploy Stress Level App (ECR + EC2)

on:
  push:
    branches: ["main"]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: stress_ecr
  ECR_REGISTRY: 920562273229.dkr.ecr.ap-south-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Configure AWS credentials
      - name: Configure AWS credentials
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set region $AWS_REGION

      # 3. Login to ECR
      - name: Login to AWS ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $ECR_REGISTRY

      # 4. Build Docker image
      - name: Build Docker image
        run: docker build --no-cache -t $ECR_REPOSITORY:$IMAGE_TAG .

      # 5. Scan image using Trivy
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      # 6. Tag image
      - name: Tag Docker image
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 7. Push to ECR
      - name: Push Docker image
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 8. Deploy to EC2 (Normal Deployment)
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            AWS_REGION=ap-south-1
            ECR_REGISTRY=920562273229.dkr.ecr.ap-south-1.amazonaws.com
            ECR_REPOSITORY=stress_ecr
            IMAGE_TAG=${{ github.sha }}

            echo "Login to ECR..."
            aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin $ECR_REGISTRY

            echo "Pull latest image..."
            docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

            echo "Stop old container..."
            docker stop stress-app || true
            docker rm stress-app || true

            echo "Run new container..."
            docker run -d \
              --restart unless-stopped \
              --name stress-app \
              -p 8501:8501 \
              $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

            echo "Cleaning unused images..."
            docker image prune -f

            echo "Deployment successful!"
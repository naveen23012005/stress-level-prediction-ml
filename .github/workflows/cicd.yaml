name: Stress Level Prediction

on:
    push:
        branches: ["main", "temp"]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            
            - name: Checkout code
              uses: actions/checkout@v3
            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                python-version: "3.11"
            - name: Install dependencies
              run: |
                pip install -r requirements.txt
            - name: Run tests
              run: |
               pytest -v
            # 2. Set up Docker Buildx
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

             # 3. Login to Docker Hub
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            # 4. Build and Push Docker image
            - name: Build and Push
              uses: docker/build-push-action@v5
              with:
                context: .
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/stress-app:latest
            - name: Deploy to EC2
              uses: appleboy/ssh-action@v0.1.10
              with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ secrets.EC2_USER }}
                key: ${{ secrets.EC2_KEY }}
                script: |
                  docker pull ${{ secrets.DOCKERHUB_USERNAME }}/stress-app:latest
                  docker stop stress-app || true
                  docker rm stress-app || true
                  docker run -d -p 8052:8501 --name stress-app \
                   ${{ secrets.DOCKERHUB_USERNAME }}/stress-app:latest
name: stress frontend deployment

on:
  push:
    branches:
      - main

concurrency:
  group: production-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        working-directory: frontend
        run: npm install

      - name: Run Security Audit
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Verify Environment
        run: echo "Production build started"

      - name: Build Angular Production App
        working-directory: frontend
        run: npx ng build --configuration production

      - name: Verify Build Output
        run: |
          if [ ! -d "frontend/dist/frontend/browser" ]; then
            echo "Build folder missing!"
            exit 1
          fi

          if [ ! -f "frontend/dist/frontend/browser/index.html" ]; then
            echo "index.html missing!"
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Backup Current index.html
        run: |
          aws s3 cp \
          s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
          s3://${{ secrets.S3_BUCKET_NAME }}/rollback/index-$(date +%Y%m%d-%H%M%S).html || true

      - name: Upload Static Assets
        run: |
          aws s3 sync frontend/dist/frontend/browser s3://${{ secrets.S3_BUCKET_NAME }} \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html
        run: |
          aws s3 cp frontend/dist/frontend/browser/index.html \
          s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
          --cache-control "no-cache,no-store,must-revalidate"

      - name: Verify Uploaded Files
        run: aws s3 ls s3://${{ secrets.S3_BUCKET_NAME }}

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html" "/"

      - name: Deployment Health Check
        run: |
          set -e
          URL="https://${{ secrets.DOMAIN_NAME }}"
          echo "Checking URL: $URL"
          sleep 60

          for i in {1..5}; do
            echo "Attempt $i"
            if curl -L --fail --silent --show-error "$URL" > /dev/null; then
              echo "Deployment health check passed!"
              exit 0
            fi
            echo "Health check failed. Retrying in 15 seconds..."
            sleep 15
          done

          echo "Deployment health check failed after multiple attempts!"
          exit 1

      - name: Deployment Success
        run: echo "Frontend deployed successfully!"
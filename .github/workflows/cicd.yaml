name: Stress Level Prediction

on:
    push:
        branches: ["main", "temp"]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            
            - name: Checkout code
              uses: actions/checkout@v3
            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                python-version: "3.11"
            - name: Install dependencies
              run: |
                pip install -r requirements.txt
            - name: Run tests
              run: |
               pytest -v
            # 2. Set up Docker Buildx
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

             # 3. Login to Docker Hub
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            # 4. Build and Push Docker image
            - name: Build and Push
              uses: docker/build-push-action@v5
              with:
                context: .
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/stress-app:latest
            - name: Deploy to EC2 (Blue-Green)
              uses: appleboy/ssh-action@v0.1.10
              with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ secrets.EC2_USER }}
                key: ${{ secrets.EC2_KEY }}
                script: |

                  echo "🚀 Connected to EC2"

                  IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/stress-app:latest

                  echo "📥 Pull latest image"
                  docker pull $IMAGE

                  echo "📦 Existing containers:"
                  docker ps -a

                  # Detect current running version
                  if docker ps --format '{{.Names}}' | grep -q stress-blue; then
                    CURRENT=blue
                    NEW=green
                    NEW_PORT=8053
                  elif docker ps --format '{{.Names}}' | grep -q stress-green; then
                    CURRENT=green
                    NEW=blue
                    NEW_PORT=8052
                  else
                    echo "⚠️ No existing container found. First deployment."
                    CURRENT=none
                    NEW=blue
                    NEW_PORT=8052
                  fi

                  echo "👉 Deploying NEW version: $NEW on port $NEW_PORT"

                  # Stop and remove NEW container if exists
                  docker stop stress-$NEW || true
                  docker rm stress-$NEW || true

                  # Run new container
                  docker run -d -p $NEW_PORT:8501 --name stress-$NEW $IMAGE

                  echo "⏳ Waiting for app to start..."
                  sleep 15

                  echo "🧪 Health check..."
                  curl -f http://localhost:$NEW_PORT || exit 1

                  # Stop old container if exists
                  if [ "$CURRENT" != "none" ]; then
                  echo "🛑 Stopping old version: $CURRENT"
                  docker stop stress-$CURRENT || true
                  docker rm stress-$CURRENT || true
                  fi

                  echo "📊 Final running containers:"
                  docker ps

                  echo "✅ Deployment successful!"